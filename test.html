<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vuetify 2 in Static HTML</title>
  <!-- Vuetify CSS -->
  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <v-app>
      <v-container>
        <v-list>
          <v-list-item v-for="item in items" :key="item.title">
            <v-list-item-title>{{ item.title }}</v-list-item-title>
          </v-list-item>
        </v-list>
      </v-container>
    </v-app>
  </div>

  <!-- Vue.js -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <!-- Vuetify JS -->
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.js"></script>
  <script>
    new Vue({
      el: '#app',
      vuetify: new Vuetify(),
      data: {
        items: [
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 1' },
          { title: 'Item 2' },
          { title: 'Item 3' }
        ]
      }
    })
  </script>
</body>
</html>
